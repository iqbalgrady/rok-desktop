name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build web assets
        run: bun run build:web

      - name: Package Electron (macOS)
        if: matrix.os == 'macos-latest'
        run: bun run --cwd packages/electron package
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Electron (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: bun run --cwd packages/electron package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Electron (Windows)
        if: matrix.os == 'windows-latest'
        run: bun run --cwd packages/electron package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rok-desktop-${{ matrix.os }}
          path: packages/electron/dist/*.{dmg,exe,AppImage,zip,deb,latest.yml,blockmap}

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rokcode/rok-desktop:latest .

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker tag rokcode/rok-desktop:latest rokcode/rok-desktop:${{ github.ref_name }}
          docker push rokcode/rok-desktop:latest
          docker push rokcode/rok-desktop:${{ github.ref_name }}

  vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build VS Code extension
        run: bun run --cwd packages/vscode build

      - name: Package VS Code extension
        run: bun run --cwd packages/vscode package

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: rok-desktop-vscode
          path: packages/vscode/*.vsix
