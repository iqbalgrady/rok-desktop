services:
  rok-desktop:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rok-desktop
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/rok-desktop:/home/rok-desktop/.config/rok-desktop
      - ./data/rokcode/share:/home/rok-desktop/.local/share/rokcode
      - ./data/rokcode/state:/home/rok-desktop/.local/state/rokcode
      - ./data/rokcode/config:/home/rok-desktop/.config/rokcode
      - ./data/ssh:/home/rok-desktop/.ssh
      - ./workspaces:/home/rok-desktop/workspaces
    environment:
      # Docker binds to 0.0.0.0 for port mapping, so UI auth is required.
      # Set this before starting, for example:
      #   ROK_DESKTOP_UI_PASSWORD="$(openssl rand -base64 24)" docker compose up -d
      ROK_DESKTOP_UI_PASSWORD: ${ROK_DESKTOP_UI_PASSWORD:?Set ROK_DESKTOP_UI_PASSWORD before exposing Rok Desktop through Docker}
    # ROK_DESKTOP_HOST: 0.0.0.0  # Bind address (default in Docker entrypoint: 0.0.0.0)
    # ROK_DESKTOP_TUNNEL_PROVIDER: cloudflare
    # ROK_DESKTOP_TUNNEL_MODE: quick  # quick | managed-remote | managed-local
    # ROK_DESKTOP_TUNNEL_HOSTNAME: app.example.com  # required for managed-remote
    # ROK_DESKTOP_TUNNEL_TOKEN: your_cloudflare_token  # required for managed-remote
    # ROK_DESKTOP_TUNNEL_CONFIG: /home/rok-desktop/.cloudflared/config.yml  # optional for managed-local
    # ROKCODE_HOST: http://172.17.0.1:4096 # Connect to external Rokcode server
    # ROKCODE_SKIP_START: true # skip starting rokcode
    # ROK_DESKTOP_OPENCODE_HOSTNAME: 0.0.0.0 # Bind rokcode to all interfaces
    restart: unless-stopped
